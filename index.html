<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Event Overlay - Infinite Scroll Flawless</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --panel:    rgba(255, 255, 255, 0.95); 
  --border:   rgba(0, 0, 0, 0.15); 
  --gold:     #c9a84c;
  --text-main:#111111; 
  --text-dim: rgba(0, 0, 0, 0.6); 
}

/* ═══════════════════════════════
   SETĂRI PENTRU TRANSPARENȚĂ
═══════════════════════════════ */
html, body {
  width: 1920px; height: 1080px;
  overflow: hidden;
  background: transparent; 
  font-family: 'Inter', sans-serif;
}

#overlay {
  width: 1920px; height: 1080px;
  position: relative;
  background: transparent;
  pointer-events: none; 
}

/* ═══════════════════════════════
   TOP STRIP — scrolling sponsors
═══════════════════════════════ */
#top-strip {
  position: absolute;
  top: 0; left: 0;
  width: 1920px; height: 68px;
  background: var(--panel);
  display: flex; align-items: center;
  padding: 0 36px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
}

#top-strip::before {
  content: '';
  position: absolute; left: 0; top: 0;
  width: 4px; height: 100%;
  background: var(--gold);
}

#top-strip::after {
  content: '';
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg,
    var(--gold) 0%,
    rgba(201,168,76,0.4) 40%,
    transparent 80%);
}

.strip-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; 
  letter-spacing: 3px;
  color: var(--text-main); 
  text-transform: uppercase;
  white-space: nowrap;
  padding-right: 28px;
  margin-right: 28px;
  border-right: 2px solid var(--border);
  flex-shrink: 0;
}

.sponsors-scroll {
  flex: 1; overflow: hidden;
  display: flex; align-items: center;
  height: 100%;
}

.sponsors-track {
  display: flex; align-items: center;
  /* Aici am scos 'gap' și folosim 'margin' pe elemente pentru simetrie matematică perfectă */
  width: max-content;
  animation: scrollLeft 60s linear infinite; /* Am pus 60s pentru o curgere naturală */
}
@keyframes scrollLeft {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Stil comun pentru logo-urile și textele sponsorilor */
.sp-name {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  white-space: nowrap;
  margin-right: 52px; /* Înlocuiește gap-ul */
}

/* Pentru logo-uri: le forțăm la aceeași înălțime (35px) ca să fie egale vizual */
.sp-name img {
  height: 35px; 
  width: auto;
  object-fit: contain;
}

/* Pentru textul pur (ex: CONTITECH) */
.sp-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; 
  letter-spacing: 2px;
  color: var(--text-main);
  line-height: 1; 
}

.sp-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(0,0,0,0.2);
  flex-shrink: 0;
  margin-right: 52px; /* Înlocuiește gap-ul */
}

/* ═══════════════════════════════
   CORNER BRACKETS
═══════════════════════════════ */
.brk {
  position: absolute;
  width: 42px; height: 42px;
  opacity: 0.8;
}
.brk svg { width: 100%; height: 100%; }
.brk.tl { top: 68px;  left: 0; }
.brk.tr { top: 68px;  right: 0;  transform: scaleX(-1); }
.brk.bl { bottom: 150px; left: 0;  transform: scaleY(-1); }
.brk.br { bottom: 150px; right: 0; transform: scale(-1,-1); }

/* ═══════════════════════════════
   BOTTOM BAR
═══════════════════════════════ */
#bottom-bar {
  position: absolute;
  bottom: 0; left: 0;
  width: 1920px; height: 150px;
  background: linear-gradient(0deg,
    rgba(255,255,255,0.98) 50%, 
    transparent 100%); 
  overflow: hidden;
}

#bottom-bar::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg,
    transparent 5%,
    rgba(201,168,76,0.8) 50%,
    transparent 95%);
}

.row {
  position: absolute;
  bottom: 30px; left: 0;
  width: 100%;
  display: flex; align-items: center;
  justify-content: center;
  gap: 12px; 
  opacity: 1; 
  transform: translateY(0);
}

.row-tag {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; 
  letter-spacing: 4px;
  color: #000; 
  white-space: nowrap;
  padding-right: 25px;
  border-right: 3px solid var(--gold); 
  flex-shrink: 0;
}

.logo-card {
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 20px; 
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.02); 
  position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
  height: 65px; 
}
.logo-card::before {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px;
  background: linear-gradient(90deg,
    transparent, var(--gold), transparent);
}
.logo-card img {
  max-height: 40px; 
  width: auto;
  object-fit: contain;
  display: block;
}

.sep {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border); flex-shrink: 0;
}
</style>
</head>
<body>
<div id="overlay">

  <div id="top-strip">
    <div class="strip-label">SPONSORI</div>
    <div class="sponsors-scroll">
      <div class="sponsors-track" id="track"></div>
    </div>
  </div>

  <div class="brk tl"><svg viewBox="0 0 42 42" fill="none"><path d="M0 26L0 0L26 0" stroke="#c9a84c" stroke-width="2.5"/></svg></div>
  <div class="brk tr"><svg viewBox="0 0 42 42" fill="none"><path d="M0 26L0 0L26 0" stroke="#c9a84c" stroke-width="2.5"/></svg></div>
  <div class="brk bl"><svg viewBox="0 0 42 42" fill="none"><path d="M0 26L0 0L26 0" stroke="#c9a84c" stroke-width="2.5"/></svg></div>
  <div class="brk br"><svg viewBox="0 0 42 42" fill="none"><path d="M0 26L0 0L26 0" stroke="#c9a84c" stroke-width="2.5"/></svg></div>

  <div id="bottom-bar">

    <div class="row" id="r-org">
      <div class="row-tag">ORGANIZATORI</div>
      
      <div class="logo-card"><img src="logo11.png" alt="Org"></div>
      <div class="sep"></div>
      
      <div class="logo-card"><img src="logo1.jpg" alt="Org"></div>
      <div class="sep"></div>
      
      <div class="logo-card"><img src="logo7.png" alt="Org"></div>
      <div class="sep"></div>
      
      <div class="logo-card"><img src="logo3.jpg" alt="Org"></div>
      <div class="sep"></div>
      
      <div class="logo-card"><img src="logo8.png" alt="Org"></div>
      <div class="sep"></div>
      
      <div class="logo-card"><img src="logo9.jpg" alt="Org"></div>
      <div class="sep"></div>
      
      <div class="logo-card"><img src="logo10.png" alt="Org"></div>
    </div>

  </div>

</div>
<script>
/* Lista mixtă: imagini și text simplu pentru sponsori */
const spItems = [
  'logo2.png',
  'logo5.jpg',
  'CONTITECH FLUID AUTOMOTIVE ROMANIA S.R.L.', 
  'logo12.png',
  'logo13.jpeg',  
  'logo6.png'
];

const track = document.getElementById('track');

/* Multiplicăm lista pentru a umple lățimea ecranului.
   Formăm un grup de bază care se repetă de 2 ori, pentru a crea 
   două jumătăți EXACT identice ale întregului șir. */
const baseGroup = [...spItems, ...spItems];
const infiniteItems = [...baseGroup, ...baseGroup];

infiniteItems.forEach((item) => {
  // 1. Adăugăm imaginea sau textul
  const el = document.createElement('div');
  el.className = 'sp-name'; 
  
  const isImage = item.match(/\.(jpeg|jpg|gif|png|svg)$/i) != null;
  if (isImage) {
    el.innerHTML = `<img src="${item}" alt="Sponsor">`;
  } else {
    el.innerHTML = `<span class="sp-text">${item}</span>`; 
  }
  track.appendChild(el);

  // 2. Adăugăm un punct DUPĂ fiecare sponsor (fără excepții)
  // Asta garantează că structura se leagă perfect la finalul animației (-50%)
  const d = document.createElement('div'); 
  d.className = 'sp-dot'; 
  track.appendChild(d); 
});
</script>
</body>
</html>
